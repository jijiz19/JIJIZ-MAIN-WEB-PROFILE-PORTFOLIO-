<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reels | Jizryl S. Arboleda</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .reel-container {
            position: relative;
            width: 100%;
            padding-top: 177.78%; /* 9:16 Aspect Ratio */
            background-color: #000;
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid #333;
            transition: 0.3s;
        }
        .reel-container:hover {
            border-color: #ffc107;
        }
        .reel-container video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body class="bg-dark text-white">

    <nav class="py-3 border-bottom border-secondary sticky-top bg-dark">
        <div class="container d-flex justify-content-between align-items-center">
            <a href="index.html" class="text-decoration-none text-secondary fw-bold">← Back to Home</a>
            <span class="text-warning fw-bold small text-uppercase">&lt;Reels/&gt;</span>
        </div>
    </nav>

    <div class="container my-5 text-center">
        <h1 class="display-5 fw-bold text-warning">Shorts & Reels</h1>
        <p class="text-secondary mb-5">Quick clips of my editing skills,technical process and project demos.</p>

        <div class="row g-3 justify-content-center">
            
            <div class="col-6 col-md-4 col-lg-3">
                <div class="reel-container shadow">
                    <video loop muted playsinline onmouseover="this.play()" onmouseout="this.pause()">
                        <source src="reel1.mp4" type="video/mp4">
                    </video>
                </div>
                <p class="small mt-2 text-secondary">Self Editing Intro</p>
            </div>

            <div class="col-6 col-md-4 col-lg-3">
                <div class="reel-container shadow">
                    <video loop muted playsinline onmouseover="this.play()" onmouseout="this.pause()">
                        <source src="reel2.mp4" type="video/mp4">
                    </video>
                </div>
                <p class="small mt-2 text-secondary">My Canva Website</p>
            </div>

        </div>
    </div>
    <footer class="main-footer mt-5">
        <div class="container text-center">
            <p class="mb-1">© 2025 Jizryl Arboleda | Portfolio Website</p>
            <small>Aspiring MIS Officer & Data Analyst</small>
        </div>
    </footer>

        // Simple message for mobile users
        console.log("Hover or tap to play videos");
    </script>
</body>
</html>
